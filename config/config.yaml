data:
  source: "synthetic"  # kaggle, huggingface, synthetic, mixed
  synthetic_n_samples: 100000
  fraud_ratio: 0.017
  test_size: 0.2
  val_size: 0.1
  random_seed: 42

preprocessing:
  outlier_method: "iqr"  # iqr, zscore
  outlier_threshold: 3.0
  scaler: "robust"  # standard, robust, minmax
  time_windows: [1, 6, 12, 24]  # hours

graph:
  window_size: 1000  # transactions per graph
  max_neighbors: 50
  temporal_encoding_dim: 16

gan:
  noise_dim: 128
  generator_hidden: [256, 512, 256]
  discriminator_hidden: [256, 512, 256]
  learning_rate: 0.0001
  beta1: 0.0
  beta2: 0.9
  n_critic: 5
  gradient_penalty_lambda: 10.0
  epochs: 200
  batch_size: 256
  synthetic_multiplier: 3  # generate 3x fraud samples

gnn:
  hidden_dim: 128
  num_sage_layers: 2
  num_gat_layers: 2
  gat_heads: 4
  dropout: 0.3
  learning_rate: 0.0005  # lower LR stabilizes early optimization on imbalanced fraud data
  epochs: 60  # additional epochs improve convergence for hybrid fraud modeling
  batch_size: 64
  max_neighbors: 30  # cap neighbors per node in GNN aggregation to reduce over-smoothing on dense graphs
  pos_weight: 1.0  # focal_alpha carries fraud-class emphasis; avoid double-penalizing minority class
  focal_alpha: 0.75  # up-weight fraud class contribution in focal loss on skewed labels
  focal_gamma: 2.0  # standard focal gamma to focus hard examples without excessive suppression
  lr_patience: 5  # allow scheduler to wait longer before reducing LR on noisy validation curves

continual_learning:
  ewc_lambda: 5000.0
  replay_buffer_size: 10000
  replay_ratio: 0.3
  fisher_samples: 1000

ensemble:
  fusion_method: "learned"  # weighted, learned, stacking
  gan_weight: 0.3
  gnn_weight: 0.7
  calibration: true

inference:
  window_size: 500
  batch_timeout_ms: 100
  max_batch_size: 32
  device: "auto"  # auto, cpu, cuda

training:
  device: "auto"
  num_workers: 4
  early_stopping_patience: 15  # longer patience is safer with PR-AUC-driven early stopping on imbalance
  checkpoint_dir: "checkpoints"
  log_dir: "logs"
